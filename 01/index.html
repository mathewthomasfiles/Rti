<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mathew Thomas's Files</title>
<style>
  body {
    margin: 0;
    font-family: Tahoma, Arial, sans-serif;
    background-color: #d4d0c8;
    background-image: repeating-linear-gradient(45deg,#d4d0c8,#d4d0c8 2px,#c8c4bc 2px,#c8c4bc 4px);
  }

  .topbar {
    background: linear-gradient(#2a6ad7, #0b3ea8);
    color: white;
    padding: 8px 12px;
    font-size: 16px;
    font-weight: bold;
  }

  .workspace {
    padding: 25px;
  }

  .section {
    margin-bottom: 30px;
  }

  .section-title {
    text-align: center;
    font-size: 27px;
    font-weight: bold;
    margin: 10px 0 15px 0;
    color: #333;
  }

  .grid {
    display: grid;
    grid-template-columns: 160px 160px;
    gap: 25px;
    justify-content: center;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: 160px 160px 160px;
    gap: 25px;
    justify-content: center;
  }

  .tile {
    width: 160px;
    height: 140px;
    background: #f2f2f2;
    border: 1px solid #999;
    box-shadow: 5px 5px 6px rgba(0,0,0,0.35);
    position: relative;
    cursor: pointer;
  }

  .icon {
    position: absolute;
    top: 8px;
    left: 8px;
    width: 36px;
    height: 36px;
  }

  .icon img {
    width: 100%;
    height: 100%;
  }

  .label {
    position: absolute;
    bottom: 10px;
    left: 10px;
    right: 10px;
    font-size: 20px;
  }

  .divider {
    border-top: 1px solid #a0a0a0;
    margin: 20px 0;
  }

</style>
</head>
<body>

<div class="topbar">Mathew Thomas's Files</div>

<div class="workspace">

  <!-- Section 1 -->
  <div class="section">
    <div class="section-title">RTIs and Responses</div>
    <div class="grid">

      <div class="tile" onclick="go('https://mathewthomasfiles.github.io/Rti/11/')">
        <div class="icon">
          <img src="https://cdn-icons-png.flaticon.com/512/3062/3062634.png">
        </div>
        <div class="label">RTI Tracker</div>
      </div>

      <div class="tile" onclick="go('https://calendar.google.com/calendar/u/0?cid=bWF0aGV3dGhvbWFzYWFkaGFhckBnbWFpbC5jb20')">
        <div class="icon">
          <img src="https://cdn-icons-png.flaticon.com/512/3652/3652191.png">
        </div>
        <div class="label">RTI & Events Calender</div>
      </div>

    </div>
  </div>

  <div class="divider"></div>

  <!-- Section 2 -->
  <div class="section">
    <div class="section-title">Case Listing in High Court</div>

    <div class="grid-3">

      <div class="tile" onclick="go('https://mathewthomasfiles.github.io/Rti/12/')">
        <div class="icon">
          <img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png">
        </div>
        <div class="label">HC Case on Case Listing</div>
      </div>

      <div class="tile" onclick="go('https://mathewthomasfiles.github.io/Rti/13/')">
        <div class="icon">
          <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
        </div>
        <div class="label">Mind Maps for HC Case Listing</div>
      </div>

      <div class="tile" onclick="go('https://drive.google.com/file/d/1Pvh2lZtj9tq0N8SbocHoLP3HDEapOXeu/view?usp=sharing')">
        <div class="icon">
          <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
        </div>
        <div class="label">RTI Compilation on Case Listing</div>
      </div>

    </div>
  </div>

  <div class="divider"></div>

  <!-- Section 3 -->
  <div class="section">
    <div class="section-title">AADHAAR and UIDAI</div>
    <div class="grid">

      <div class="tile" style="grid-column: 1 / span 2;" onclick="go('https://mathewthomasfiles.github.io/Rti/14/')">
        <div class="icon">
          <img src="https://cdn-icons-png.flaticon.com/512/564/564619.png">
        </div>
        <div class="label">Top 16 Frauds Using AADHAAR</div>
      </div>

    </div>
  </div>

</div>

<script>
function go(url){
  window.location.href = url;
}
</script>

</body>
</html>
